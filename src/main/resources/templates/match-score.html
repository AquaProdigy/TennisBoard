<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Scoreboard | Match Score</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <script src="/static/js/app.js"></script>
</head>
<body>
<header class="header">
    <section class="nav-header">
        <div class="brand">
            <div class="nav-toggle">
                <img src="/images/menu.png" alt="Logo" class="logo">
            </div>
            <span class="logo-text">TennisScoreboard</span>
        </div>
        <div>
            <nav class="nav-links">
                <a class="nav-link" th:href="@{/index}">Home</a>
                <a class="nav-link" th:href="@{/matches}">Matches</a>
            </nav>
        </div>
    </section>
</header>
<main>
    <div class="container">
        <h1>Current match</h1>
        <div class="current-match-image"></div>
        <section class="score">
            <table class="table">
                <thead class="result">
                <tr>
                    <th class="table-text">Player</th>
                    <th class="table-text">Sets</th>
                    <th class="table-text">Games</th>
                    <th class="table-text">Points</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${matchScore != null}" class="player1">
                    <td class="table-text" th:text="${matchScore.getFirstPlayer().name()}"></td>
                    <td class="table-text" th:text="${matchScore.firstPlayerSets}"></td>
                    <td class="table-text" th:text="${matchScore.firstPlayerGames}"></td>
                    <td class="table-text" th:text="${matchScore.firstPlayerPoints}"></td>
<!--                    <td class="table-text" th:text="${matchScore.tieBreak ? matchScore.firstPlayer.tieBreakPoints : matchScore.firstPlayer.points.value}"></td>-->
                    <td class="table-text">
                        <form th:action="@{/match-score(uuid=${param.uuid})}" th:method="post">
                            <input type="hidden" name="player" value="1">
                            <input type="submit" value="Score">
                        </form>
                    </td>
                </tr>
                <tr th:if="${matchScore != null}" class="player2">
                    <td class="table-text" th:text="${matchScore.getFirstPlayer().name()}"></td>
                    <td class="table-text" th:text="${matchScore.secondPlayerSets}"></td>
                    <td class="table-text" th:text="${matchScore.secondPlayerGames}"></td>
                    <td class="table-text" th:text="${matchScore.secondPlayerPoints}"></td>
<!--                    <td class="table-text" th:text="${matchScore.tieBreak ? matchScore.secondPlayer.tieBreakPoints : matchScore.secondPlayer.points.value}"></td>-->
                    <td class="table-text">
                        <form th:action="@{/match-score(uuid=${param.uuid})}" th:method="post">
                            <input type="hidden" name="player" value="2">
                            <input type="submit" value="Score">
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
<footer>
    <div class="footer">
        <p>&copy; Tennis Scoreboard, project from <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.</p>
    </div>
</footer>
</body>
</html>
