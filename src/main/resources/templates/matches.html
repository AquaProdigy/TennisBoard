<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Scoreboard | Finished Matches</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <script src="/js/app.js"></script>
</head>

<body>
<header class="header">
    <section class="nav-header">
        <div class="brand">
            <div class="nav-toggle">
                <img src="/images/menu.png" alt="Logo" class="logo">
            </div>
            <span class="logo-text">TennisScoreboard</span>
        </div>
        <div>
            <nav class="nav-links">
                <a class="nav-link" th:href="@{/index}">Home</a>
                <a class="nav-link" th:href="@{/matches}">Matches</a>
            </nav>
        </div>
    </section>
</header>
<main>
    <div class="container">
        <h1>Matches</h1>
        <div class="input-container">
            <form th:action="@{/matches}" th:method="get" class="center">
                <input class="input-filter"
                       placeholder="Filter by name"
                       type="text"
                       name="filterName"
                       th:value="${filterName}"
                       id="filterInput"/>
                <input type="hidden" name="size" th:value="${matches.size}"/>
                <input type="hidden" name="page" value="0"/>

                <button type="submit" class="btn-filter">Search</button>
            </form>

            <div>
                <a      th:if="${filterName != null || !filterName.isEmpty()}"
                        th:href="@{/matches(page=${matches.number}, size=${matches.size})}">
                    <button class="btn-filter">Reset Filter</button>
                </a>
            </div>
        </div>

        <table class="table-matches">
            <tr>
                <th>Player One</th>
                <th>Player Two</th>
                <th>Winner</th>
            </tr>
            <tr th:each="match : ${matches}">
                <td th:text="${match.getNamePlayer1()}"></td>
                <td th:text="${match.getNamePlayer2()}"></td>
                <td><span class="winner-name-td" th:text="${match.getNameWinner()}"></span></td>
            </tr>
        </table>

        <div class="pagination">
            <a class="prev"
               th:classappend="${matches.hasPrevious() ? '' : 'disabled'}"
               th:href="@{/matches(page=${matches.number - 1}, filterName=${filterName}, size=${matches.getSize()})}"
            > < </a>

            <a class="num-page current disabled"
               th:text="${matches.number + 1}"></a>


            <a class="next"
               th:classappend="${matches.hasNext() ? '' : 'disabled'}"
               th:href="@{/matches(page=${matches.number + 1}, filterName=${filterName}, size=${matches.getSize()})}"
            > > </a>
        </div>
    </div>
</main>
<footer>
    <div class="footer">
        <p>&copy; Tennis Scoreboard, project from <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a>
            roadmap.</p>
    </div>
</footer>
</body>
</html>
